# XcodeGen spec — the source of truth for the Xcode project (the .xcodeproj is
# generated and gitignored). Generate with:  xcodegen generate
# This project exists ONLY to build the things SwiftPM can't: the macOS app
# bundle and the Finder Sync app-extension. The engine stays in the SwiftPM
# package (RenamrCore), which both the SwiftPM CLI and this app depend on.
name: Renamr
options:
  bundleIdPrefix: app.renamr
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  RenamrCore:
    path: .            # the local SwiftPM package in this repo (provides RenamrCore)

targets:
  Renamr:
    type: application
    platform: macOS
    sources:
      - Sources/RenamrApp
    dependencies:
      - package: RenamrCore
        product: RenamrCore
      - target: RenamrFinderExtension
        embed: true
    settings:
      base:
        INFOPLIST_FILE: XcodeSupport/RenamrApp-Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: app.renamr.Renamr
        PRODUCT_NAME: Renamr
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
        # Ad-hoc for local/$0 builds; swap to "Developer ID Application" + a team
        # to distribute (the Finder extension needs that to load for end users).
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual

  RenamrFinderExtension:
    type: app-extension
    platform: macOS
    sources:
      - FinderExtension
    dependencies:
      - sdk: FinderSync.framework
    settings:
      base:
        INFOPLIST_FILE: XcodeSupport/RenamrFinder-Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: app.renamr.Renamr.FinderExtension
        PRODUCT_NAME: RenamrFinderExtension
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
